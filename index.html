<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外賣助手 (專屬雲端版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 您的專屬 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyCjYXsZQl0Q9oNs0MJ-V0GYdX8znQd6Cs0",
            authDomain: "takeaway-app-6cfcb.firebaseapp.com",
            projectId: "takeaway-app-6cfcb",
            storageBucket: "takeaway-app-6cfcb.firebasestorage.app",
            messagingSenderId: "134175730363",
            appId: "1:134175730363:web:393756d54eaf23ef20d79e"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 設定一個固定的集合名稱，方便在您的資料庫中尋找
        const appId = 'takeaway-main-data'; 

        // 預設為今日日期
        const getTodayDate = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        window.currentDate = getTodayDate();
        
        window.sharedState = {
            restaurants: { "預設餐廳": { menu: [], sideOptions: [] } },
            currentRestaurant: "預設餐廳"
        };
        
        window.dailyState = {
            orders: [],
            extraCharge: 0,
            discount: 1,
            overrides: {},
            isLocked: false
        };

        let user = null;
        let dailyUnsubscribe = null;
        window.activeItemIdx = null;

        // 全局 Toast 提示功能
        window.showToast = (msg, isError = false) => {
            const toast = document.getElementById('global-toast');
            toast.innerText = msg;
            toast.className = `fixed top-[110px] left-1/2 -translate-x-1/2 z-[60] px-6 py-2.5 rounded-full shadow-xl font-black flex items-center gap-2 animate-bounce-in text-sm whitespace-nowrap text-white ${isError ? 'bg-red-500' : 'bg-emerald-500'}`;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };

        window.syncShared = async () => {
            if (!user || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared', 'main');
                await setDoc(docRef, window.sharedState);
            } catch (e) {
                console.error("Shared sync error:", e);
                throw e;
            }
        };

        window.syncDaily = async () => {
            if (!user || !db) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'daily', window.currentDate);
                await setDoc(docRef, window.dailyState);
            } catch (e) {
                console.error("Daily sync error:", e);
                throw e;
            }
        };

        const setupDailyListener = () => {
            if (!db) return;
            if (dailyUnsubscribe) dailyUnsubscribe();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'daily', window.currentDate);
            
            getDoc(docRef).then(snap => {
                if (!snap.exists()) {
                    window.dailyState = { orders: [], extraCharge: 0, discount: 1, overrides: {}, isLocked: false };
                    window.syncDaily().catch(()=>{});
                } else {
                    window.dailyState = snap.data();
                    if(window.dailyState.isLocked === undefined) window.dailyState.isLocked = false;
                    if(!window.dailyState.overrides) window.dailyState.overrides = {};
                }
                window.renderAll();
                
                dailyUnsubscribe = onSnapshot(docRef, (s) => {
                    if (s.exists()) {
                        window.dailyState = s.data();
                        if(window.dailyState.isLocked === undefined) window.dailyState.isLocked = false;
                        if(!window.dailyState.overrides) window.dailyState.overrides = {};
                        window.renderAll();
                    }
                }, (err) => {
                    console.error("Firestore daily error", err);
                    if (err.code === 'permission-denied') {
                        window.showToast("資料庫權限不足，請檢查 Firebase 規則", true);
                    }
                });
            });
        };

        const initAuth = async () => {
            if (!auth) return;
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth Error:", error);
                window.showToast("登入失敗，請確認已在 Firebase 開啟匿名登入", true);
            }
        };

        if (auth) {
            onAuthStateChanged(auth, async (u) => {
                user = u;
                if (user) {
                    const sharedRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared', 'main');
                    try {
                        const sharedSnap = await getDoc(sharedRef);
                        if (!sharedSnap.exists()) {
                            await setDoc(sharedRef, window.sharedState).catch(()=>{});
                        } else {
                            window.sharedState = sharedSnap.data();
                        }
                    } catch(e) {
                        if(e.code === 'permission-denied') {
                            window.showToast("設定檔權限不足，請檢查 Firebase 規則", true);
                        }
                    }
                    
                    onSnapshot(sharedRef, (s) => {
                        if (s.exists()) {
                            window.sharedState = s.data();
                            window.renderAll();
                        }
                    });

                    setupDailyListener();
                }
            });
        }

        window.changeDate = (newDate) => {
            if(!newDate) return;
            window.currentDate = newDate;
            document.getElementById('global-date').value = window.currentDate;
            setupDailyListener();
        };

        window.jumpToDate = (date) => {
            window.changeDate(date);
            window.showTab('pay');
        };

        window.showDialog = (title, msg, type = 'alert', onOk = null) => {
            const overlay = document.getElementById('dialog-overlay');
            overlay.classList.replace('hidden', 'flex');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-msg').innerText = msg;
            const input = document.getElementById('dialog-input');
            const cancelBtn = document.getElementById('dialog-cancel');
            if (type === 'prompt') {
                input.value = ''; // 清空上次的輸入
                input.classList.remove('hidden'); cancelBtn.classList.remove('hidden');
                setTimeout(() => input.focus(), 100);
            } else if (type === 'confirm') {
                input.classList.add('hidden'); cancelBtn.classList.remove('hidden');
            } else {
                input.classList.add('hidden'); cancelBtn.classList.add('hidden');
            }
            document.getElementById('dialog-ok').onclick = () => {
                overlay.classList.replace('flex', 'hidden');
                if (onOk) onOk(type === 'prompt' ? input.value : true);
            };
            cancelBtn.onclick = () => {
                overlay.classList.replace('flex', 'hidden');
                if (onOk) onOk(false); // 取消時傳回 false
            };
        };

        // --- 核心邏輯 ---
        
        // 【新增功能】刪除餐廳
        window.deleteRestaurant = async () => {
            const rList = Object.keys(window.sharedState.restaurants);
            const r = window.sharedState.currentRestaurant;
            
            if (rList.length <= 1) {
                return window.showDialog("提示", "系統必須保留至少一間餐廳，無法刪除！", "alert");
            }

            window.showDialog("刪除餐廳", `確定要刪除「${r}」嗎？\n此操作將會清空該餐廳的所有菜單與加配選項。`, "confirm", async (res) => {
                if (res) {
                    delete window.sharedState.restaurants[r];
                    // 自動切換到列表中的第一個餐廳
                    window.sharedState.currentRestaurant = Object.keys(window.sharedState.restaurants)[0];
                    window.renderAll();
                    try { 
                        await window.syncShared(); 
                        window.showToast("🗑️ 已成功刪除餐廳");
                    } catch(e) { 
                        window.showToast("同步失敗: 請檢查 Firebase 權限", true); 
                    }
                }
            });
        };

        window.addItem = async () => {
            if(window.dailyState.isLocked) return window.showDialog("提示", "帳單已鎖定，無法修改菜單");
            const nameEl = document.getElementById('f-name');
            const priceEl = document.getElementById('f-price');
            const name = nameEl.value.trim();
            const price = parseFloat(priceEl.value);
            if (!name || isNaN(price)) return window.showDialog("提示", "請輸入名稱及價錢");
            
            const r = window.sharedState.currentRestaurant;
            if (!window.sharedState.restaurants[r]) window.sharedState.restaurants[r] = { menu: [], sideOptions: [] };
            window.sharedState.restaurants[r].menu.unshift({ name, price });
            
            nameEl.value = ''; priceEl.value = '';
            
            window.renderAll(); 
            try { 
                await window.syncShared(); 
            } catch(e) { 
                window.showToast("同步失敗: 請檢查 Firebase 權限", true); 
            }
        };

        window.openModal = (idx) => {
            if(window.dailyState.isLocked) return window.showDialog("提示", "當日帳單已鎖定，無法新增訂單");
            window.activeItemIdx = idx;
            const item = window.sharedState.restaurants[window.sharedState.currentRestaurant].menu[idx];
            document.getElementById('m-item-title').innerText = item.name;
            document.getElementById('m-item-price').innerText = `$${item.price}`;
            window.renderModalSides();
            document.getElementById('m-user').value = localStorage.getItem('last_user_name') || "";
            document.getElementById('m-note').value = "";
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
        };

        window.confirmOrder = async () => {
            const userEl = document.getElementById('m-user');
            if (!userEl.value.trim()) return window.showDialog("提示", "請填寫姓名");
            
            const r = window.sharedState.currentRestaurant;
            const item = window.sharedState.restaurants[r].menu[window.activeItemIdx];
            const sidePicks = document.querySelectorAll('input[name="m-side-pick"]:checked');
            let total = item.price;
            let details = [];
            
            sidePicks.forEach(cb => {
                const side = window.sharedState.restaurants[r].sideOptions[cb.value];
                total += side.price;
                details.push(side.name);
            });
            const note = document.getElementById('m-note').value.trim();
            if (note) details.push(note);
            
            if(!window.dailyState.orders) window.dailyState.orders = [];
            window.dailyState.orders.push({ 
                id: Date.now().toString(), 
                user: userEl.value.trim(), 
                item: item.name, 
                total, 
                details: details.join(', '), 
                paid: false 
            });
            
            localStorage.setItem('last_user_name', userEl.value.trim());
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            
            window.renderAll();
            window.showToast("✅ 落單成功！");

            try { 
                await window.syncDaily(); 
            } catch(e) { 
                window.showToast("雲端同步失敗: 請檢查 Firebase 權限", true); 
            }
        };

        window.deleteOrder = (id) => {
            if(window.dailyState.isLocked) return;
            window.showDialog("刪除", "確定刪除嗎？", "confirm", async (r) => { 
                if(r){ 
                    window.dailyState.orders = window.dailyState.orders.filter(o=>o.id!==id); 
                    window.renderAll();
                    try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
                }
            });
        };

        window.togglePaid = async (id) => { 
            const o = window.dailyState.orders.find(x=>x.id===id); 
            if(o){ 
                o.paid = !o.paid; 
                window.renderAll();
                try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
            } 
        };

        window.toggleUserPaid = async (username, isPaid) => {
            if(!window.dailyState.orders) return;
            window.dailyState.orders.forEach(o => {
                if(o.user === username) o.paid = isPaid;
            });
            window.renderAll();
            try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
        };

        window.setOverride = async (username, val) => {
            if(window.dailyState.isLocked) return;
            if(!window.dailyState.overrides) window.dailyState.overrides = {};
            
            if (val.trim() === "" || isNaN(parseFloat(val))) {
                delete window.dailyState.overrides[username];
            } else {
                window.dailyState.overrides[username] = parseFloat(val);
            }
            window.renderAll();
            try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
        };

        window.openVerifyModal = () => {
            const finalTotal = document.getElementById('total-txt').innerText;
            window.showDialog("核實帳單", `總實付額為 ${finalTotal}。\n確定要鎖定帳單嗎？`, "confirm", async (res) => {
                if(res) {
                    window.dailyState.isLocked = true;
                    window.renderAll();
                    try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
                }
            });
        };

        window.unlockDaily = async () => {
            window.showDialog("解除鎖定", "解鎖後可再次編輯訂單與金額，確定嗎？", "confirm", async (res) => {
                if(res) {
                    window.dailyState.isLocked = false;
                    window.renderAll();
                    try { await window.syncDaily(); } catch(e) { window.showToast("同步失敗", true); }
                }
            });
        };

        window.sendWhatsApp = () => {
            const parts = window.currentDate.split('-');
            const formattedDate = parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : window.currentDate;
            const msg = `於${formattedDate}的帳單已核實，請到平台確認及付款`;
            const encodedUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.open(encodedUrl, '_blank');
        };

        window.calcTotals = (data) => {
            const orders = data.orders || [];
            const extra = data.extraCharge || 0;
            const discInput = data.discount || 1;
            const overrides = data.overrides || {};

            const groups = {};
            orders.forEach(o => {
                if(!groups[o.user]) groups[o.user] = { subtotal: 0, items: [], fullyPaid: true };
                groups[o.user].subtotal += o.total;
                groups[o.user].items.push(o);
                if(!o.paid) groups[o.user].fullyPaid = false;
            });

            const rawOrdersTotal = orders.reduce((a,b)=>a+b.total, 0);
            const userCount = Object.keys(groups).length;

            const totalBeforeDiscount = rawOrdersTotal + extra;
            let totalSavings = 0;
            if (discInput > 0 && discInput <= 1) {
                totalSavings = totalBeforeDiscount - (totalBeforeDiscount * discInput);
            } else {
                totalSavings = Math.abs(discInput === 1 ? 0 : discInput);
            }

            const avgExtra = userCount > 0 ? (extra / userCount) : 0;
            const avgDiscountAmount = userCount > 0 ? (totalSavings / userCount) : 0;

            let overallFinalAdjustedTotal = 0;
            let overallUnpaid = 0;

            Object.entries(groups).forEach(([name, d]) => {
                const calcFinal = d.subtotal + avgExtra - avgDiscountAmount;
                const hasOverride = overrides[name] !== undefined;
                const userFinal = hasOverride ? overrides[name] : Math.max(0, calcFinal);

                groups[name].userFinal = userFinal;
                groups[name].calcFinal = calcFinal;
                groups[name].hasOverride = hasOverride;

                overallFinalAdjustedTotal += userFinal;
                if (!d.fullyPaid) overallUnpaid += userFinal;
            });

            return { groups, overallFinalAdjustedTotal, overallUnpaid };
        };

        window.loadReport = async () => {
            const rc = document.getElementById('report-container');
            rc.innerHTML = '<div class="text-center py-10 text-slate-400 font-bold animate-pulse">掃描帳單中...</div>';
            
            if(!db) {
                rc.innerHTML = '<div class="text-center py-10 text-red-400 font-bold">目前處於離線或無權限模式，無法讀取報告</div>';
                return;
            }

            try {
                const dailyRef = collection(db, 'artifacts', appId, 'public', 'data', 'daily');
                const snap = await getDocs(dailyRef);
                const unpaidDays = [];

                snap.forEach(docSnap => {
                    const date = docSnap.id;
                    const data = docSnap.data();
                    if (!data.orders || data.orders.length === 0) return;

                    const { groups, overallUnpaid } = window.calcTotals(data);
                    
                    if (overallUnpaid > 0) {
                        const unpaidUsers = Object.entries(groups)
                            .filter(([_, d]) => !d.fullyPaid && d.userFinal > 0)
                            .map(([name, d]) => ({ name, owe: d.userFinal }));
                            
                        if (unpaidUsers.length > 0) {
                            unpaidDays.push({ date, overallUnpaid, unpaidUsers });
                        }
                    }
                });

                unpaidDays.sort((a, b) => b.date.localeCompare(a.date));

                if (unpaidDays.length === 0) {
                    rc.innerHTML = `
                        <div class="bg-emerald-50 border border-emerald-100 p-8 rounded-2xl text-center shadow-sm mt-4">
                            <div class="text-4xl mb-3">🎉</div>
                            <h3 class="text-emerald-600 font-black text-lg mb-1">所有帳單已收齊！</h3>
                            <p class="text-emerald-500/70 text-xs font-bold">目前沒有任何欠款紀錄</p>
                        </div>`;
                    return;
                }

                let totalOwedAcrossDays = unpaidDays.reduce((sum, d) => sum + d.overallUnpaid, 0);

                rc.innerHTML = `
                    <div class="mb-4 bg-red-50 p-4 rounded-xl border border-red-100 flex justify-between items-center shadow-sm">
                        <span class="font-black text-red-800">總未收金額</span>
                        <span class="font-black text-red-600 text-xl">$${totalOwedAcrossDays.toFixed(1)}</span>
                    </div>
                    ${unpaidDays.map(day => `
                    <div class="p-4 rounded-xl border mb-3 bg-white shadow-sm border-slate-200">
                        <div class="flex justify-between items-center mb-3 pb-2 border-b border-slate-100">
                            <span class="font-black text-slate-800 flex items-center gap-2">
                                📅 ${day.date}
                            </span>
                            <span class="font-black text-red-500 text-sm bg-red-50 px-2 py-0.5 rounded">欠 $${day.overallUnpaid.toFixed(1)}</span>
                        </div>
                        <div class="space-y-2 mb-4">
                            ${day.unpaidUsers.map(u => `
                                <div class="flex justify-between items-center text-sm px-1">
                                    <span class="text-slate-600 font-bold">${u.name}</span>
                                    <span class="text-slate-500 font-black">$${u.owe.toFixed(1)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="window.jumpToDate('${day.date}')" class="w-full py-3 bg-slate-100 text-slate-600 rounded-lg text-sm font-black active:bg-slate-200 transition-colors">前往該日處理 ➔</button>
                    </div>
                `).join('')}`;

            } catch(e) {
                console.error(e);
                rc.innerHTML = '<div class="text-center py-10 text-red-400 font-bold">讀取報告失敗，請檢查網路或權限</div>';
            }
        };

        window.renderAll = () => {
            const { restaurants, currentRestaurant } = window.sharedState;
            const { orders, extraCharge, discount, isLocked } = window.dailyState;
            const isLockedState = isLocked === true;

            const lockBadge = document.getElementById('lock-badge');
            if (isLockedState) {
                lockBadge.classList.remove('hidden');
                document.getElementById('form-add-item').classList.add('opacity-50', 'pointer-events-none');
            } else {
                lockBadge.classList.add('hidden');
                document.getElementById('form-add-item').classList.remove('opacity-50', 'pointer-events-none');
            }

            const restSel = document.getElementById('rest-sel');
            restSel.innerHTML = Object.keys(restaurants).map(r => `<option value="${r}" ${r===currentRestaurant?'selected':''}>${r}</option>`).join('');
            
            const items = restaurants[currentRestaurant]?.menu || [];
            document.getElementById('menu-list').innerHTML = items.map((it, idx) => `
                <div class="flex items-center justify-between p-3.5 bg-white rounded-xl mb-2 shadow-sm border border-slate-200 ${isLockedState ? 'opacity-70' : 'active:bg-orange-50'}" onclick="window.openModal(${idx})">
                    <div class="flex-1 min-w-0 mr-2">
                        <div class="font-bold text-slate-800 text-base truncate">${it.name}</div>
                        <div class="text-orange-500 font-bold text-sm">$${it.price}</div>
                    </div>
                    <div class="w-8 h-8 bg-orange-100 text-orange-600 rounded-lg flex items-center justify-center font-black ${isLockedState ? 'hidden' : ''}">＋</div>
                </div>
            `).join('') || '<div class="text-center py-10 text-slate-400 text-sm">暫無餐點</div>';

            const tallyItems = {};
            (orders || []).forEach(o => { 
                if (!tallyItems[o.item]) tallyItems[o.item] = { total: 0, details: {} };
                tallyItems[o.item].total += 1;
                const detailKey = o.details ? o.details : '標準 (無加配/備註)';
                tallyItems[o.item].details[detailKey] = (tallyItems[o.item].details[detailKey] || 0) + 1;
            });

            document.getElementById('tally-list').innerHTML = Object.entries(tallyItems).map(([mainItem, data]) => `
                <div class="mb-3 border border-orange-100 rounded-lg overflow-hidden bg-white shadow-sm">
                    <div class="bg-orange-50 p-2.5 flex justify-between items-center border-b border-orange-100">
                        <span class="font-black text-slate-800">${mainItem}</span>
                        <span class="bg-orange-500 text-white px-2.5 py-0.5 rounded-full font-black text-xs">共 ${data.total} 份</span>
                    </div>
                    <div class="p-2 space-y-1.5">
                        ${Object.entries(data.details).map(([det, count]) => `
                            <div class="flex justify-between items-start text-sm pl-2 pr-1">
                                <div class="text-slate-600 font-medium relative before:content-[''] before:w-1.5 before:h-1.5 before:bg-orange-300 before:absolute before:left-0 before:top-1.5 before:rounded-full pl-3.5 flex-1 pr-2 leading-tight">
                                    ${det}
                                </div>
                                <span class="text-slate-500 font-bold text-xs shrink-0 pt-0.5">x ${count}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('') || '<p class="text-slate-400 text-xs text-center py-4">暫無資料</p>';

            document.getElementById('inp-extra').value = extraCharge || 0;
            document.getElementById('inp-disc').value = discount || 1;
            document.getElementById('inp-extra').disabled = isLockedState;
            document.getElementById('inp-disc').disabled = isLockedState;

            const { groups, overallFinalAdjustedTotal } = window.calcTotals(window.dailyState);

            document.getElementById('pay-list').innerHTML = Object.entries(groups).map(([name, data]) => {
                const { userFinal, calcFinal, hasOverride, fullyPaid } = data;
                
                return `
                <div class="p-3.5 rounded-xl border mb-3 bg-white shadow-sm border-slate-200 transition-colors ${fullyPaid ? 'bg-emerald-50/30 border-emerald-200' : ''}">
                    <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-100">
                        <div class="flex items-center gap-2">
                            <span class="font-black text-slate-800 text-lg">${name}</span>
                            ${fullyPaid 
                                ? `<span class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-black border border-emerald-200 shadow-sm flex items-center gap-1">✅ 已付清</span>` 
                                : `<button onclick="window.toggleUserPaid('${name}', true)" class="bg-orange-100 text-orange-600 text-[10px] px-2 py-0.5 rounded font-black border border-orange-200 active:bg-orange-200 shadow-sm transition-colors">一鍵收齊</button>`
                            }
                        </div>
                        <div class="text-right">
                            <span class="font-black ${fullyPaid ? 'text-emerald-500' : 'text-slate-800'} text-lg">$${userFinal.toFixed(1)}</span>
                            <div class="text-[10px] text-slate-400">系統原計: $${calcFinal.toFixed(1)}</div>
                        </div>
                    </div>
                    ${data.items.map(i => `
                        <div class="flex items-center gap-2 text-xs mb-1.5 pl-1">
                            <input type="checkbox" ${i.paid?'checked':''} onchange="window.togglePaid('${i.id}')" class="w-4 h-4 accent-emerald-500 cursor-pointer shadow-sm rounded">
                            <span class="flex-1 font-medium ${i.paid ? 'text-slate-400 line-through' : 'text-slate-600'} truncate transition-all">${i.item} <span class="text-slate-400 opacity-80">${i.details ? '('+i.details+')' : ''}</span></span>
                            ${!isLockedState ? `<button onclick="window.deleteOrder('${i.id}')" class="text-red-400 px-1 py-0.5 bg-red-50 rounded">刪</button>` : ''}
                        </div>
                    `).join('')}
                    
                    ${!isLockedState ? `
                    <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">
                        <span class="text-[10px] font-bold text-slate-500">實付金額 (可點擊直接修改)</span>
                        <div class="flex items-center gap-1">
                            <span class="text-slate-400 font-bold text-sm">$</span>
                            <input type="number" step="0.1" value="${hasOverride ? userFinal : ''}" placeholder="${calcFinal.toFixed(1)}" onchange="window.setOverride('${name}', this.value)" class="w-20 text-center bg-slate-50 border border-slate-200 rounded text-sm font-black outline-none py-1.5 focus:border-orange-400 focus:bg-white transition-colors placeholder:text-slate-300 placeholder:font-normal">
                        </div>
                    </div>` : `
                    <div class="mt-2 text-right text-[10px] text-slate-400 font-bold">最終結算金額: $${userFinal.toFixed(1)} ${hasOverride ? '<span class="text-orange-400">(已手動更改)</span>' : ''}</div>
                    `}
                </div>`;
            }).join('') || '<div class="text-center py-10 text-slate-400 text-sm font-bold">當日無訂單</div>';

            document.getElementById('total-txt').innerText = `$${overallFinalAdjustedTotal.toFixed(1)}`;

            const actionArea = document.getElementById('action-area');
            if (isLockedState) {
                actionArea.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.unlockDaily()" class="flex-1 bg-slate-200 text-slate-700 py-3.5 rounded-xl font-black shadow-sm flex items-center justify-center gap-1 active:bg-slate-300 transition-colors">🔓 解除鎖定</button>
                        <button onclick="window.sendWhatsApp()" class="flex-[2] bg-emerald-500 text-white py-3.5 rounded-xl font-black shadow-md flex items-center justify-center gap-1 active:bg-emerald-600 transition-colors">📱 發送 WhatsApp</button>
                    </div>`;
            } else {
                actionArea.innerHTML = `
                    <div class="flex gap-2">
                        <button onclick="window.openVerifyModal()" class="flex-[2] bg-slate-800 text-white py-3.5 rounded-xl font-black shadow-md flex items-center justify-center gap-1 active:bg-slate-900 transition-colors">✅ 核實並鎖定</button>
                        <button onclick="window.sendWhatsApp()" class="flex-1 bg-emerald-500 text-white py-3.5 rounded-xl font-black shadow-md flex items-center justify-center gap-1 active:bg-emerald-600 transition-colors">📱 WhatsApp</button>
                    </div>`;
            }
        };

        window.renderModalSides = () => {
            const { restaurants, currentRestaurant } = window.sharedState;
            const sides = restaurants[currentRestaurant]?.sideOptions || [];
            document.getElementById('m-sides-list').innerHTML = sides.map((s, i) => `
                <label class="flex items-center justify-between p-2.5 bg-slate-50 rounded-lg border border-slate-200 has-[:checked]:bg-orange-50 has-[:checked]:border-orange-200 text-sm">
                    <div class="flex items-center truncate mr-1"><input type="checkbox" name="m-side-pick" value="${i}" class="w-4 h-4 mr-2 shrink-0"><span class="font-bold truncate text-xs">${s.name}</span></div>
                    <span class="text-orange-600 font-bold text-xs shrink-0">+$${s.price}</span>
                </label>
            `).join('');
        };

        window.addSideInModal = async () => {
            const n = document.getElementById('m-side-name').value;
            const p = parseFloat(document.getElementById('m-side-price').value) || 0;
            if (n) {
                const r = window.sharedState.currentRestaurant;
                if (!window.sharedState.restaurants[r].sideOptions) window.sharedState.restaurants[r].sideOptions = [];
                window.sharedState.restaurants[r].sideOptions.push({ name: n, price: p });
                window.renderModalSides(); 
                document.getElementById('m-side-name').value = ''; document.getElementById('m-side-price').value = '';
                
                try { await window.syncShared(); } 
                catch(e) { window.showToast("同步失敗: 權限不足", true); }
            }
        };

        window.showTab = (t) => {
            const footer = document.getElementById('main-footer');
            ['menu','pay','report'].forEach(x => { 
                document.getElementById(`sec-${x}`).classList.add('hidden'); 
                document.getElementById(`tab-${x}`).className = "py-3 font-bold border-b-2 border-transparent text-slate-400 text-sm flex items-center justify-center gap-1 transition-colors"; 
            });
            document.getElementById(`sec-${t}`).classList.remove('hidden');
            document.getElementById(`tab-${t}`).className = "py-3 font-black border-b-2 border-orange-500 text-orange-600 bg-orange-50/50 text-sm flex items-center justify-center gap-1 transition-colors";
            
            if (t === 'pay') {
                footer.classList.remove('hidden');
                document.body.classList.add('has-footer');
            } else {
                footer.classList.add('hidden');
                document.body.classList.remove('has-footer');
            }

            if (t === 'report') {
                window.loadReport();
            }
        };

        initAuth();

        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('global-date');
            if(dateInput) dateInput.value = window.currentDate;
        });

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        input, select, textarea { font-size: 16px !important; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 12px); }
        body.has-footer main { padding-bottom: 120px; }
        body:not(.has-footer) main { padding-bottom: 40px; }
        .animate-bounce-in { animation: bounceIn 0.5s ease; }
        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="global-toast" class="hidden"></div>

    <div class="fixed top-0 left-0 right-0 z-40 bg-white shadow-sm border-b border-slate-200">
        <header class="flex justify-between items-center px-4 max-w-md mx-auto h-[54px] bg-slate-900 text-white">
            <h1 class="text-base font-black tracking-tight flex items-center gap-2">
                🍱 外賣助手
                <span id="lock-badge" class="hidden bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded shadow-inner">🔒 鎖定中</span>
            </h1>
            <div class="flex items-center gap-2">
                <input type="date" id="global-date" onchange="window.changeDate(this.value)" class="bg-slate-800 border border-slate-700 text-white px-2 py-1 rounded text-sm font-bold outline-none cursor-pointer">
            </div>
        </header>
        <nav class="grid grid-cols-3 max-w-md mx-auto">
            <button onclick="window.showTab('menu')" id="tab-menu" class="py-3 font-black border-b-2 border-orange-500 text-orange-600 bg-orange-50/50 text-sm flex items-center justify-center gap-1 transition-colors">
                <span>📝</span> 點餐
            </button>
            <button onclick="window.showTab('pay')" id="tab-pay" class="py-3 font-bold border-b-2 border-transparent text-slate-400 text-sm flex items-center justify-center gap-1 transition-colors">
                <span>💰</span> 結帳
            </button>
            <button onclick="window.showTab('report')" id="tab-report" class="py-3 font-bold border-b-2 border-transparent text-slate-400 text-sm flex items-center justify-center gap-1 transition-colors">
                <span>📊</span> 報告
            </button>
        </nav>
    </div>

    <main class="pt-[110px] px-3 max-w-md mx-auto w-full box-border transition-all">
        
        <section id="sec-menu" class="space-y-4">
            <!-- 餐廳選擇與新增/刪除區塊更新 -->
            <div class="flex gap-1.5">
                <select id="rest-sel" onchange="window.sharedState.currentRestaurant=this.value;window.renderAll();window.syncShared().catch(()=>{});" class="flex-1 min-w-0 bg-white px-2 py-2.5 rounded-xl shadow-sm border border-slate-300 font-bold text-sm outline-none"></select>
                <button onclick="window.deleteRestaurant()" class="bg-red-50 text-red-500 font-bold px-3 py-2.5 rounded-xl text-xs shrink-0 whitespace-nowrap shadow-sm border border-red-200 transition-colors active:bg-red-100">刪除</button>
                <button onclick="window.showDialog('新餐廳','輸入餐廳名稱','prompt',async (n)=>{if(n){window.sharedState.restaurants[n]={menu:[],sideOptions:[]};window.sharedState.currentRestaurant=n;window.renderAll();try{await window.syncShared();}catch(e){window.showToast('同步失敗',true);}}})" class="bg-slate-200 text-slate-800 font-bold px-3 py-2.5 rounded-xl text-xs shrink-0 whitespace-nowrap shadow-sm border border-slate-300 transition-colors active:bg-slate-300">＋ 餐廳</button>
            </div>
            
            <div id="form-add-item" class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 transition-opacity">
                <p class="text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">新增餐點至菜單</p>
                <div class="flex gap-2">
                    <input type="text" id="f-name" placeholder="餐點名稱" class="flex-[2] min-w-0 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-sm outline-none focus:border-orange-400">
                    <input type="number" id="f-price" placeholder="價錢 $" class="flex-1 min-w-0 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-sm outline-none focus:border-orange-400">
                    <button onclick="window.addItem()" class="w-14 shrink-0 bg-orange-500 text-white font-black rounded-lg text-xs shadow-sm active:bg-orange-600 transition-colors">新增</button>
                </div>
            </div>

            <div id="menu-list" class="space-y-2 pb-6"></div>
        </section>

        <section id="sec-pay" class="hidden space-y-4">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">附加費 $ (均分)</label>
                    <input type="number" id="inp-extra" onchange="window.dailyState.extraCharge=parseFloat(this.value)||0; window.renderAll(); window.syncDaily().catch(()=>{});" class="w-full bg-slate-50 p-2 rounded-lg font-black text-base outline-none">
                </div>
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">折扣 (平均平攤)</label>
                    <input type="number" step="0.01" id="inp-disc" onchange="window.dailyState.discount=parseFloat(this.value)||1; window.renderAll(); window.syncDaily().catch(()=>{});" class="w-full bg-slate-50 p-2 rounded-lg font-black text-base outline-none text-orange-600">
                </div>
            </div>

            <div class="bg-transparent">
                <h3 class="font-black text-slate-800 text-sm mb-3 flex items-center pl-1">📋 落單數量總計</h3>
                <div id="tally-list"></div>
            </div>

            <div id="pay-list"></div>
            <div id="action-area" class="pt-2 pb-6"></div>

        </section>

        <section id="sec-report" class="hidden pb-6">
            <div class="mb-4 pt-1">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">欠款追蹤報告</h2>
                <p class="text-xs text-slate-500 font-bold mt-1">系統會自動列出過往所有未收齊款項的帳單</p>
            </div>
            
            <div id="report-container"></div>
        </section>

    </main>

    <footer id="main-footer" class="hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] safe-pb">
        <div class="max-w-md mx-auto p-3 px-4 flex justify-between items-center">
            <div>
                <span class="text-[10px] text-slate-500 font-bold block">該日實付總額</span>
                <span id="total-txt" class="text-2xl font-black text-orange-500 leading-tight">$0</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded font-bold inline-block">含微調及平攤</p>
            </div>
        </div>
    </footer>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-black/70 z-50 items-end sm:items-center justify-center sm:p-4 backdrop-blur-sm">
        <div class="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-3 text-center border-b border-slate-100 flex justify-between items-center">
                <div class="text-left">
                    <h3 id="m-item-title" class="text-base font-black text-slate-800 leading-tight"></h3>
                    <p id="m-item-price" class="text-orange-500 font-black text-sm"></p>
                </div>
                <button onclick="document.getElementById('modal-overlay').classList.replace('flex', 'hidden')" class="w-8 h-8 bg-slate-100 rounded-full text-slate-500 font-bold text-sm flex items-center justify-center">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="flex items-center gap-2">
                    <label class="font-black text-slate-500 text-xs shrink-0 w-12">姓名</label>
                    <input type="text" id="m-user" placeholder="誰點的？" class="flex-1 bg-slate-50 border border-slate-200 p-2.5 rounded-lg font-bold outline-none text-sm focus:border-orange-400 focus:bg-white transition-colors">
                </div>
                <div>
                    <label class="font-black text-slate-500 text-xs mb-1.5 block">加配項目 (副餐/飲品)</label>
                    <div id="m-sides-list" class="grid grid-cols-2 gap-2"></div>
                    <div class="mt-2 p-2 bg-slate-50 border border-dashed border-slate-300 rounded-lg">
                        <div class="flex gap-1.5">
                            <input type="text" id="m-side-name" placeholder="新增選項" class="flex-[2] min-w-0 px-2 py-1.5 rounded bg-white border border-slate-200 font-bold text-xs outline-none focus:border-orange-300">
                            <input type="number" id="m-side-price" placeholder="+$" class="flex-1 min-w-0 px-2 py-1.5 rounded bg-white border border-slate-200 font-bold text-xs outline-none focus:border-orange-300">
                            <button onclick="window.addSideInModal()" class="bg-slate-800 text-white font-black px-2.5 rounded text-xs active:bg-slate-900 transition-colors">＋</button>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <label class="font-black text-slate-500 text-xs shrink-0 w-12">備註</label>
                    <input type="text" id="m-note" placeholder="如：少甜、走冰" class="flex-1 bg-slate-50 border border-slate-200 p-2.5 rounded-lg font-bold outline-none text-sm focus:border-orange-400 focus:bg-white transition-colors">
                </div>
            </div>
            <div class="p-3 border-t border-slate-100 bg-white safe-pb">
                <button onclick="window.confirmOrder()" class="w-full py-3 bg-orange-500 text-white font-black rounded-xl text-base shadow-md active:bg-orange-600 transition-colors">確認加入訂單</button>
            </div>
        </div>
    </div>

    <div id="dialog-overlay" class="hidden fixed inset-0 bg-black/70 z-[100] items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-2xl shadow-2xl p-6 flex flex-col gap-4">
            <h3 id="dialog-title" class="text-lg font-black text-slate-800 text-center"></h3>
            <p id="dialog-msg" class="text-slate-500 font-bold text-sm text-center whitespace-pre-line"></p>
            <input type="text" id="dialog-input" class="hidden w-full p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none font-bold text-center focus:border-orange-400 focus:bg-white transition-colors">
            <div class="flex gap-2">
                <button id="dialog-cancel" class="hidden flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl active:bg-slate-200 transition-colors">取消</button>
                <button id="dialog-ok" class="flex-1 py-3 bg-orange-500 text-white font-black rounded-xl shadow-md active:bg-orange-600 transition-colors">確定</button>
            </div>
        </div>
    </div>
</body>
</html>
